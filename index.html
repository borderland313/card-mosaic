<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Mosaic Tool</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main>
    <h1>Card Mosaic Tool</h1>

    <section class="controls">
      <label class="wide">Pick bundled SVG preset
        <select id="svgPicker">
          <option value="">-- none --</option>
          <option value="assets/img/svg-sources/butterfly.svg">Butterfly</option>
          <option value="assets/img/svg-sources/cat.svg">Cat</option>
          <option value="assets/img/svg-sources/circle.svg">Circle</option>
          <option value="assets/img/svg-sources/square.svg">Square</option>
          <option value="assets/img/svg-sources/triangle.svg">Triangle</option>
          <option value="assets/img/svg-sources/diamond.svg">Diamond</option>
          <option value="assets/img/svg-sources/star.svg">Star</option>
          <option value="assets/img/svg-sources/heart.svg">Heart</option>
          <option value="assets/img/svg-sources/moon.svg">Moon</option>
          <option value="assets/img/svg-sources/sun.svg">Sun</option>
          <option value="assets/img/svg-sources/target.svg">Target</option>
          <option value="assets/img/svg-sources/plus.svg">Plus</option>
          <option value="assets/img/svg-sources/x-shape.svg">X Shape</option>
          <option value="assets/img/svg-sources/arrow-right.svg">Arrow Right</option>
          <option value="assets/img/svg-sources/checker.svg">Checker</option>
          <option value="assets/img/svg-sources/barcode.svg">Barcode</option>
          <option value="assets/img/svg-sources/pawn.svg">Pawn</option>
          <option value="assets/img/svg-sources/ghost.svg">Ghost</option>
          <option value="assets/img/svg-sources/keyhole.svg">Keyhole</option>
          <option value="assets/img/svg-sources/bolt.svg">Bolt</option>
          <option value="assets/img/svg-sources/chat-bubble.svg">Chat Bubble</option>
          <option value="assets/img/svg-sources/mountain.svg">Mountain</option>
          <option value="assets/img/svg-sources/profile-face.svg">Profile Face</option>
          <option value="assets/img/svg-sources/pixel-parrot.svg">Pixel Parrot</option>
          <option value="assets/img/svg-sources/side-city.svg">Side City</option>
          <option value="assets/img/svg-sources/spiral-block.svg">Spiral Block</option>
          <option value="assets/img/svg-sources/hand-point.svg">Hand Point</option>
          <option value="assets/img/svg-sources/robot-head.svg">Robot Head</option>
          <option value="assets/img/svg-sources/ascii-runner.svg">ASCII Runner</option>
          <option value="assets/img/svg-sources/wave-koi.svg">Wave Koi</option>
          <option value="assets/img/svg-sources/glitch-skull.svg">Glitch Skull</option>
          <option value="assets/img/svg-sources/asym-mandala.svg">Asym Mandala</option>
          <option value="assets/img/svg-sources/block-dragon.svg">Block Dragon</option>
          <option value="assets/img/svg-sources/megaphone.svg">Megaphone</option>
        </select>
      </label>

      <label class="wide">Or upload image
        <input id="imageInput" type="file" accept="image/*,.svg" />
      </label>

      <label>Width (cards)
        <input id="widthCardsInput" type="number" min="5" max="300" value="45" />
      </label>

      <label>Height (cards)
        <input id="heightCardsInput" type="number" min="5" max="300" value="60" />
      </label>

      <label>Contrast
        <input id="contrastInput" type="range" min="0.5" max="2" step="0.05" value="1" />
      </label>

      <label>Border rank
        <select id="borderRankInput">
          <option>A</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option selected>10</option>
        </select>
      </label>

      <label>Border suit
        <select id="borderSuitInput">
          <option value="spades" selected>♠ Spades</option>
          <option value="clubs">♣ Clubs</option>
          <option value="hearts">♥ Hearts</option>
          <option value="diamonds">♦ Diamonds</option>
        </select>
      </label>

      <fieldset class="suit-box wide">
        <legend>Suits in image area</legend>
        <div class="suit-grid">
          <label><input type="checkbox" class="suitInput" value="spades" checked> ♠ Spades</label>
          <label><input type="checkbox" class="suitInput" value="clubs" checked> ♣ Clubs</label>
          <label><input type="checkbox" class="suitInput" value="hearts" checked> ♥ Hearts</label>
          <label><input type="checkbox" class="suitInput" value="diamonds" checked> ♦ Diamonds</label>
        </div>
        <div class="suit-actions">
          <button type="button" id="suitsAllBtn">All</button>
          <button type="button" id="suitsBlackBtn">Black</button>
          <button type="button" id="suitsRedBtn">Red</button>
        </div>
      </fieldset>

      <div class="actions wide">
        <button type="button" id="generateBtn">Generate</button>
        <button type="button" id="exportJsonBtn">Export JSON</button>
        <button type="button" id="exportCsvBtn">Export CSV</button>
      </div>
    </section>

    <section class="output">
      <div class="canvases">
        <div class="panel">
          <h2>Original</h2>
          <canvas id="originalCanvas" width="900" height="600"></canvas>
        </div>

        <div class="panel">
          <h2>Card Mosaic</h2>
          <canvas id="mosaicCanvas" width="900" height="600"></canvas>
        </div>
      </div>

      <pre id="statusPanel"></pre>
    </section>

    <img id="sourceImage" alt="source" hidden />
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
